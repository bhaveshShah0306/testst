   body {

    top: 50%;

  .footer-sec {
    display: flex;
    justify-content: space-around;

    color: white;

  }

  .footer-sec>div {

    text-align: center;
    /* Center-aligns the content */
    padding: 15px;
    /* Adds padding inside each block for spacing */
  }

  @media (max-width: 768px) {
    .footer-sec {
      flex-direction: column;
      /* Stacks the children vertically */
    }

    .footer-sec>div {
      width: 100%;
      /* Each child takes full width */
      margin-bottom: 20px;
      /* Adds space between stacked items */
    }
  }

  .btn:hover {
    background-color: white;
    color: #834333;
  }

  /* Styles within your <style> tag or external stylesheet */
  .copyright {
    display: flex;
    justify-content: space-between;

    align-items: center;
    /* Vertically centers items */
    padding: 20px 30px;
    /* Adjusts padding for spacing */
    background-color: black;
    /* Or any desired background color */
    color: white;
    /* Text color */
  }

  @media (max-width: 768px) {
    .copyright {
      flex-direction: column;
      /* Stacks items vertically */
      text-align: center;
      /* Centers the text for a cleaner look on narrow screens */
    }

    /* Remove individual paddings and apply uniform padding */
    .copyright>p {
      padding: 10px 0;
      /* Adds vertical padding, removes horizontal padding */
      justify-content: center;
      /* This style is not necessary as text-align:center in the parent takes effect */
    }
  }
  @media (max-width: 480px) {
    .block1 img {
