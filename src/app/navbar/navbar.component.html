<main class="main">
  <div class="container">
    <nav class="navbar navbar-expand-lg">
      <!-- Logo for mobile view -->
      <img
        class="d-lg-none"
        style="cursor: pointer"
        height="35"
        width="70"
        (click)="onclicklogo()"
        src="../../assets/logo/Prajapati Foundation Logo.png"
        alt="image"
      />

      <!-- Hamburger Menu Toggle Button - Only show on mobile via CSS -->
      <button
        class="navbar-toggler"
        type="button"
        (click)="isMenuCollapsed = !isMenuCollapsed"
        aria-controls="navbarSupportedContent"
        aria-expanded="!isMenuCollapsed"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar Links -->
      <div
        class="collapse navbar-collapse"
        [class.show]="!isMenuCollapsed"
        id="navbarSupportedContent"
      >
        <button class="close-mobile d-lg-none" (click)="isMenuCollapsed = true" aria-label="Close menu">✕</button>
        <ul class="navbar-nav mr-auto">
          <li class="nav-item p-2 d-none d-lg-block">
            <img
              style="cursor: pointer"
              (click)="onclicklogo()"
              src="../../assets/logo/Prajapati Foundation Logo.png"
              width="150"
              height="50"
              alt="image"
            />
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" routerLink="Home" (click)="closeMenu()"><b>Home</b></a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" routerLink="ApplicationForm" (click)="closeMenu()"
              ><b>Financial Assistance</b></a
            >
          </li>
          <li class="nav-item dropdown" [class.show]="isRegistrationMenuOpen">
            <a
              class="nav-link text-dark"
              role="button"
              (click)="toggleRegistrationMenu($event)"
            >
              <strong>Mentor/Mentee Registration</strong>
            </a>
            <div
              class="registration-dropdown"
              [class.show]="isRegistrationMenuOpen"
            >
              <div class="panel-content">
                <h5 class="panel-title">Mentor/Mentee Registration</h5>
                <div class="divider"></div>

                <div class="btn-group">
                  <button class="reg-btn" (click)="navigateToMentorForm()">
                    <span class="icon">👨‍🏫</span>
                    <span class="text">Mentor Registration</span>
                  </button>

                  <button class="reg-btn" (click)="navigateToMenteeForm()">
                    <span class="icon">👨‍🎓</span>
                    <span class="text">Mentee Registration</span>
                  </button>
                </div>
              </div>
            </div>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" routerLink="Membership" (click)="closeMenu()"
              ><b>Become A Member</b></a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" routerLink="donation" (click)="closeMenu()"
              ><b>Donation</b></a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" routerLink="Sponsorship" (click)="closeMenu()"
              ><b>Sponsor A Student</b></a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" routerLink="Events" (click)="closeMenu()"
              ><b>Events</b></a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" routerLink="Contact" (click)="closeMenu()"
              ><b>Contact</b></a
            >
          </li>          
        </ul>
      </div>
    </nav>
  </div>
</main>
