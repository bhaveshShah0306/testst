
<style>
    h1{
        color: #834333;
    }
    .content {
        display: flex; 
        justify-content: space-between;
        background-color: #f0f0f0;
    }
     .left-side {   
       line-height: normal;
        height: auto;    
        width: 90%; 
        padding-left: 90px;  
        margin-top: 90px;    
    }
     .right-side {       
       margin-top: 30px;
        width: 100%;   
        padding-right: 50px;
    }

.form-member{
border: 1px solid black;
  border-radius: 20px;
  width: 60%; 
  margin: 10px auto 30px; 
   
}
.form-row {
  padding-top: 20px;
   padding-left:10px;
   padding-right: 10px;
}



 input[type=text],input[type=email],input[type=date], select{ 
border: none;
outline: none;
border-bottom: 2px solid #f0f0f0;
border-radius: 0%;
height: 45px;
}
 input[type=text]:focus,input[type=email]:focus,input[type=date]:focus,select:focus,input[type=file] { 
border-bottom-color: black;
box-shadow: none;
} 
.button-container {
  display: flex;
  justify-content: center;
}
 .btn{
  background-color: #834333;
  margin-bottom: 20px;
   border: none;
  height:50px;
  color: white;
  border-radius: 10px;
  width: 200px;
 /* align-items: center;
   display: flex;
  justify-content: center; 
  margin-left: 300px;*/
 }   
 .btn:hover{
  background-color: #834333;
 }
 @media (max-width: 768px) {
  .content {
        display: flex; 
        flex-direction: column;
        background-color: #f0f0f0;
    }
    .left-side, .right-side {   
       line-height: normal;
        width: 100%; 
        padding-left: 10px;  
        margin-top: 30px;    
    }
    .form-member{
  border: 1px solid black;
  border-radius: 20px;
  width: 85%; 
  margin: 10px auto 30px; 
   
}
 }

 @media (max-width: 480px) {

  .content {
        display: flex; 
        /* justify-content: space-between; */
        flex-direction: column;
        background-color: #f0f0f0;
    }
     .left-side, .right-side {   
       line-height: normal;
        width: 100%; 
        padding-left: 10px;  
        margin-top: 30px;    
    }
    .d{
      font-size: 18;
      letter-spacing:normal;
    } 
   
 }
</style>
<div class="content">
    <div class="left-side">                  
     
      <p class="d" style="font-size: 55px;letter-spacing:1.2;font-family: Verdana;">Step into the Future with the<span style="color: #834333;"><strong> Prajapathi Foundation</strong></span></p>
      <p style=" font-size: 16px;">Join our community: Embrace the journey to support, learn, and grow with the Prajapathi Foundation.</p>                   
      <!-- <button  class="btn1">Become A Member</button>                  -->
     </div>           
     <div class="right-side">
        <img src="/assets/Frame 427319477.png" alt="image"  class="d-block" style="width:100%;height: 570px;">       
     </div>                     
 </div> 
 <img src="/assets/cloud.png" alt="image"  style="background-color: #f0f0f0;width:100%"> 
 
 <h1 style="text-align: center; color: #834333;margin-top: 20px;"><strong>Become a Member</strong></h1>
 <p style="text-align: center;color: #666;">Please, fill the form to become a member in prajapati</p>
 <div class="form-member">
   <form [formGroup]="membership" >
    <div class="form-row">
      <div class="col-md-6 mb-4 px-3">
        <label for="name">Name<span style="color: red;">*</span></label>
        <input type="text" formControlName="name" class="form-control" id="name">
        <!-- <p *ngIf="memberForm.get('memberForm')?.hasError('required') && memberForm.get('memberForm')?.touched" class="text-danger"> Name is required</p> -->
      </div>
      <div class="col-md-6 mb-4 px-3">
        <label for="mobile">Mobile Number<span style="color: red;">*</span></label>
        <input type="text" formControlName="mobile" class="form-control" id="mbl_number">      
      </div>
      
        <div class="form-group col-md-12 mb-4 px-3">
          <label for="email">Email<span style="color: red;">*</span></label>
          <input type="text" formControlName="email" class="form-control" id="email">      
        </div>
       
     <div class="form-group col-md-12 mb-4 px-3">
        <label for="address">Address<span style="color: red;">*</span></label>
        <input type="text" formControlName="address" class="form-control" id="address">      
      </div>
     
      <div class="col-md-6 mb-4 px-3">
        <label for="city">City<span style="color: red;">*</span></label>
        <input type="text" formControlName="city" class="form-control" id="city">      
      </div> 
      <div class="col-md-6 mb-4 px-3">
        <label for="country">Country<span style="color: red;">*</span></label>
        <input type="text" formControlName="country" class="form-control" id="country">      
      </div>  
    </div>
    <div class="button-container">
    <button type="submit" class="btn" (click)="onsubmit(this.membership.value)">Submit</button>
</div>
  </form>
  </div>
