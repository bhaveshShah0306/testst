
<style>
    h1{
        color: #834333;
    }
    .content {
        display: flex; 
        justify-content: space-between;
        background-color: #f0f0f0;
    }
     .left-side {   
       line-height: normal;
        height: auto;    
        width: 90%; 
        padding-left: 90px;  
        margin-top: 90px;    
    }
     .right-side {       
       margin-top: 30px;
        width: 100%;   
        padding-right: 50px;
    }

/* Base styles for the form to ensure readability and structure */
.form-member {
    max-width: 600px; /* Set a max-width for the form for large screens */
    margin: 20px auto; /* Center form on the page */
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background-color: #f9f9f9;
}

.form-row {
    display: flex;
    flex-wrap: wrap; /* Allow form rows to wrap on small screens */
    margin-bottom: 20px; /* Space between form rows */
}

.form-group {
    flex: 1; /* Flex grow to fill available space */
    min-width: 250px; /* Minimum width before wrapping */
    padding: 0 15px; /* Padding on sides */
}

.form-group label {
    display: block; /* Ensure the label is above the input */
    margin-bottom: 5px;
}

input[type="text"], input[type="email"], select {
    width: 100%; /* Full width of parent */
    padding: 10px;
    margin-bottom: 10px; /* Space below inputs */
    border: none;
    background-color: #f9f9f9;
    border-radius: 0px;
    border-bottom:2px solid black !important;
box-shadow: none;
}

.button-container {
    display: flex;
    justify-content: center; /* Center button container */
}

.btn {
    padding: 10px 20px;
    background-color: #834333;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background-color: #a8503a; /* Slightly darken button on hover */
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .form-row, .form-group {
        flex-direction: column;
        align-items: center;
    }

    .form-group {
        width: 100%; /* Full width of the form on smaller screens */
        padding: 0 10px; /* Adjust padding */
    }

    .form-member {
        padding: 15px; /* Smaller padding on smaller screens */
    }
}

</style>
<div class="content d-flex justify-content-center align-items-center ">
    <div class="left-side ">                  
     
      <p class="d" style="font-size: 55px;letter-spacing:1.2;font-family: Verdana;">Step into the Future with the<span style="color: #834333;"><strong> Prajapathi Foundation</strong></span></p>
      <p style=" font-size: 16px;">Join our community: Embrace the journey to support, learn, and grow with the Prajapathi Foundation.</p>                   
      <!-- <button  class="btn1">Become A Member</button>                  -->
     </div>           
     <div class="right-side">
        <img src="/assets/Frame 427319477.png" alt="image"  class="d-block" style="width:100%;height: 570px;">       
     </div>                     
 </div> 
 <img src="/assets/cloud.png" alt="image"  style="background-color: #f0f0f0;width:100%"> 
 
 <h1 style="text-align: center; color: #834333;margin-top: 20px;"><strong>Become a Member</strong></h1>
 <p style="text-align: center;color: #666;">Please, fill the form to become a member in prajapati</p>
 <div class="form-member">
   <form [formGroup]="membership" >
    <div class="form-row">
      <div class="form-group">
        <label for="name">Name<span style="color: red;">*</span></label>
        <input type="text" formControlName="name" class="form-control" id="name">
        <!-- <p *ngIf="memberForm.get('memberForm')?.hasError('required') && memberForm.get('memberForm')?.touched" class="text-danger"> Name is required</p> -->
      </div>
      <div class="form-group">
        <label for="mobile">Mobile Number<span style="color: red;">*</span></label>
        <input type="text" formControlName="mobile" class="form-control" id="mbl_number">      
      </div>
      
    </div>
    
      
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email<span style="color: red;">*</span></label>
          <input type="text" formControlName="email" class="form-control" id="email">      
        </div>
       
      </div>
    <div class="form-row">
     <div class="form-group">
        <label for="address">Address<span style="color: red;">*</span></label>
        <input type="text" formControlName="address" class="form-control" id="address">      
      </div>
      
    </div>
    <div class="form-row">
     
      <div class="form-group">
        <label for="city">City<span style="color: red;">*</span></label>
        <input type="text" formControlName="city" class="form-control" id="city">      
      </div> 
      <div class="form-group">
        <label for="country">Country<span style="color: red;">*</span></label>
        <input type="text" formControlName="country" class="form-control" id="country">      
      </div>  
    </div>
    <div class="button-container">
    <button type="submit" class="btn" (click)="onsubmit(this.membership.value)">Submit</button>
</div>
  </form>
  </div>
